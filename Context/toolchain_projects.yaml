projects:
  - id: e2e-xcp-bypass
    title: Turning a Legacy Calibration Setup into an ADAS AI Validation Loop
    repo_name: realtime-vehicle-ai-validation-studio
    repo_url: https://github.com/jwhwang91/realtime-vehicle-ai-validation-studio
    stack: Python / C++ / CANape / VN1640 / XCP over CAN-FD / ONNX
    hook: Constraint-driven laptop-based ADAS AI validation loop using the team's existing field calibration workflow.
    objective: >-
      Commercial-vehicle ADAS needed a practical way to explore learned-model validation on real vehicles.
      The mass-production ECU supported Ethernet, but Vector Ethernet interface hardware was not available in the field workflow,
      so I reused the available CANape/VN1640/laptop calibration setup.
    impact: >-
      Transformed the team's existing CANape/VN1640 laptop-based calibration workflow into a minimum viable ADAS AI validation loop,
      enabling learned-model experimentation on real production vehicles despite the lack of Ethernet interface hardware or dedicated AI compute platforms.
    tags:
      - Python
      - C++
      - XCP
      - CAN-FD
      - ONNX
      - CANape/VN1640
    detail_output: toolchains/e2e-xcp-bypass/index.html
    source_type: html
    source: Context/Projects/toolchains/e2e_xcp_bypass/format/detail.html

  - id: timeseries-ai-training
    title: ADAS Log-to-AI Workbench
    repo_name: adas-log-to-ai-workbench
    repo_url: https://github.com/jwhwang91/adas-log-to-ai-workbench
    stack: Python / MF4 / PyTorch / ONNX / MATLAB Export
    hook: MF4 preprocessing, model training, normalization, and export workflow for ADAS engineers.
    objective: >-
      Convert CANape MF4 measurement logs into reusable AI-ready datasets and model artifacts without forcing every module owner
      to rewrite the same preprocessing, normalization, training, and export scripts.
    impact: >-
      Gave module owners a repeatable workflow from vehicle logs to trained model artifacts, reducing duplicated data-preparation work
      and making ADAS AI experiments easier to standardize across modules.
    tags:
      - Python
      - MF4
      - PyTorch
      - ONNX
      - MATLAB Export
    detail_output: toolchains/timeseries-ai-training/index.html
    source_type: html
    source: Context/Projects/toolchains/timeseries_ai_training/format/detail.html

  - id: tos-odp-bev-simulator
    title: BEV Target Selection Validation Studio
    repo_name: bev-target-selection-validation-studio
    repo_url: https://github.com/jwhwang91/bev-target-selection-validation-studio
    stack: MATLAB Script / Simulink / Base Workspace / ADAS Visualization
    hook: MATLAB/Simulink replay and visualization tool for validating commercial-vehicle ADAS target-selection behavior.
    objective: >-
      Reproduce rare bus target-selection edge cases in a repeatable MATLAB/Simulink workflow instead of relying on repeated
      real-bus tests after every TOS/ODP logic or parameter change.
    impact: >-
      Reduced dependency on repeated vehicle tests for every iteration, helped debug false target-selection behavior, and supported
      more efficient logic tuning before final real-vehicle confirmation.
    tags:
      - MATLAB
      - Simulink
      - ADAS
      - BEV
      - TOS/ODP
    detail_output: toolchains/tos-odp-bev-simulator/index.html
    source_type: html
    source: Context/Projects/toolchains/tos_odp_bev_simulator/format/detail.html
