projects:
  - id: e2e-xcp-bypass
    title: Turning a Legacy Calibration Setup into an ADAS AI Validation Loop
    repo_name: realtime-vehicle-ai-validation-studio
    repo_url: https://github.com/jwhwang91/realtime-vehicle-ai-validation-studio
    stack: Python / C++ / CANape / VN1640 / XCP over CAN-FD / ONNX
    hook: Resource-constrained real-vehicle AI validation prototype built from the team’s existing CANape/VN1640 laptop workflow.
    objective: >-
      Help commercial-vehicle ADAS module owners explore learned-model validation on real vehicles before full Ethernet/HPC infrastructure adoption by reusing the available CANape/VN1640/laptop calibration workflow.
    impact: >-
      Provided a practical stepping stone from legacy calibration to AI validation under limited equipment, enabling model owners to map real vehicle signals, run ONNX/Python model experiments, and learn future validation concepts without waiting for Ethernet interface hardware or dedicated AI compute platforms.
    tags:
      - Python
      - C++
      - XCP
      - CAN-FD
      - ONNX
      - CANape/VN1640
      - AI Validation Transition
    detail_output: toolchains/e2e-xcp-bypass/index.html
    source_type: html
    source: Context/Projects/toolchains/e2e_xcp_bypass/format/detail.html

  - id: timeseries-ai-training
    title: ADAS Log-to-AI Workbench
    repo_name: adas-log-to-ai-workbench
    repo_url: https://github.com/jwhwang91/adas-log-to-ai-workbench
    stack: Python / MF4 / PyTorch / ONNX / MATLAB Export
    hook: CANape/MF4-to-AI workbench for module-owner learning, dataset preparation, and model-artifact export.
    objective: >-
      Help ADAS module owners turn familiar MF4 logs into AI-ready datasets and model artifacts through a repeatable preprocess/train/evaluate/export workflow, rather than forcing each engineer to build separate scripts or a full ML platform from day one.
    impact: >-
      Lowered the entry barrier for AI experimentation by connecting the existing log-analysis workflow to Python training and ONNX/MATLAB export, giving engineers a practical transition path from conventional signal review to model-behavior learning.
    tags:
      - Python
      - MF4
      - PyTorch
      - ONNX
      - MATLAB Export
      - AI Training Workflow
    detail_output: toolchains/timeseries-ai-training/index.html
    source_type: html
    source: Context/Projects/toolchains/timeseries_ai_training/format/detail.html

  - id: tos-odp-bev-simulator
    title: BEV Target Selection Validation Studio
    repo_name: bev-target-selection-validation-studio
    repo_url: https://github.com/jwhwang91/bev-target-selection-validation-studio
    stack: MATLAB Script / Simulink / Base Workspace / ADAS Visualization
    hook: Production-development BEV replay tool used for TOS/ODP false-target analysis in commercial-vehicle programs.
    objective: >-
      Replay real vehicle logs through production TOS/ODP logic to investigate false target selection and reduce repeated real-road trials, especially bus-only-lane scenarios that were difficult to reproduce on demand.
    impact: >-
      Used frequently during HMC commercial-vehicle production development; in bus scenarios, reduced repeated road-validation loops from about 10 trips to about 5 for similar issues, cutting 4–5 hour test trips roughly in half before final real-vehicle confirmation.
    tags:
      - MATLAB
      - Simulink
      - ADAS
      - BEV
      - TOS/ODP
      - Log Replay
    detail_output: toolchains/tos-odp-bev-simulator/index.html
    source_type: html
    source: Context/Projects/toolchains/tos_odp_bev_simulator/format/detail.html
