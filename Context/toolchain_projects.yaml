projects:
  - id: e2e-xcp-bypass
    title: Turning a Legacy Calibration Setup into an ADAS AI Validation Loop
    repo_name: realtime-vehicle-ai-validation-studio
    repo_url: https://github.com/jwhwang91/realtime-vehicle-ai-validation-studio
    stack: Python / C++ / CANape / VN1640 / XCP over CAN-FD / ONNX
    hook: Resource-constrained AI-transition platform for testing learned-model behavior on real vehicle signals using the team's existing calibration setup.
    objective: >-
      Build a minimum viable real-vehicle AI validation loop for a commercial-vehicle ADAS team that had limited access to Ethernet-based validation equipment and high-end AI compute platforms. Instead of waiting for full infrastructure, the project reused the available CANape/VN1640/laptop workflow to make learned-model experimentation approachable for ADAS module owners.
    impact: >-
      Created a practical bridge from conventional calibration workflows to AI-assisted validation by connecting learned models, real vehicle signals, and XCP-over-CAN-FD communication under existing field-test constraints. The project is positioned as a proactive AI-transition prototype rather than a fully deployed production tool.
    tags:
      - Python
      - C++
      - XCP
      - CAN-FD
      - ONNX
      - CANape/VN1640
    detail_output: toolchains/e2e-xcp-bypass/index.html
    source_type: html
    source: Context/Projects/toolchains/e2e_xcp_bypass/format/detail.html

  - id: timeseries-ai-training
    title: ADAS Log-to-AI Workbench
    repo_name: adas-log-to-ai-workbench
    repo_url: https://github.com/jwhwang91/adas-log-to-ai-workbench
    stack: Python / MF4 / PyTorch / ONNX / MATLAB Export
    hook: CANape/MF4-to-AI workflow for turning real vehicle measurement logs into AI-ready datasets, training runs, and exportable model artifacts.
    objective: >-
      Help ADAS module owners reuse familiar CANape/MF4 measurement data for AI experimentation without requiring a full ML platform from day one. The workbench structures preprocessing, trimming, normalization, model-script execution, evaluation, and export into a repeatable learning workflow.
    impact: >-
      Defined a practical transition path from conventional vehicle-log analysis to AI model experimentation. It reduces the entry barrier for module owners to study learned-model behavior, compare preprocessing choices, and generate artifacts for later validation workflows, while remaining clearly positioned as an AI-transition support prototype.
    tags:
      - Python
      - MF4
      - PyTorch
      - ONNX
      - MATLAB Export
    detail_output: toolchains/timeseries-ai-training/index.html
    source_type: html
    source: Context/Projects/toolchains/timeseries_ai_training/format/detail.html

  - id: tos-odp-bev-simulator
    title: BEV Target Selection Validation Studio
    repo_name: bev-target-selection-validation-studio
    repo_url: https://github.com/jwhwang91/bev-target-selection-validation-studio
    stack: MATLAB Script / Simulink / Base Workspace / ADAS Visualization
    hook: Production-development replay studio for explaining and reducing false target-selection behavior using real logs and production TOS/ODP logic.
    objective: >-
      Reproduce rare commercial-vehicle target-selection edge cases in a repeatable MATLAB/Simulink workflow instead of relying on repeated real-bus road tests after every TOS/ODP logic or parameter change.
    impact: >-
      Actively used during commercial-vehicle mass-production development to replay real logs through production TOS/ODP logic, investigate false detections, and prepare logic or calibration improvements before final vehicle confirmation. For rare bus-only-lane scenarios, it helped reduce repeated real-bus validation trips from about 10 to around 5, with each trip typically requiring 4-5 hours.
    tags:
      - MATLAB
      - Simulink
      - ADAS
      - BEV
      - TOS/ODP
    detail_output: toolchains/tos-odp-bev-simulator/index.html
    source_type: html
    source: Context/Projects/toolchains/tos_odp_bev_simulator/format/detail.html
