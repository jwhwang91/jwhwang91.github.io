id: "hmc-adas"
title: "HMC Commercial Vehicle SCC / Lvl2 ADAS"
pill: "Mass-Production Commercial-Vehicle ADAS / SCC / RoadRadius / Brake Distribution / Target Selection"
summary: >
  I worked in the SCC part of Hyundai Motor Company's commercial-vehicle SCC/LFA development organization,
  contributing to mass-production SCC tuning, FOC tuning, regulation-driven state-transition updates, vehicle validation,
  and production issue response. My independent technical ownership focused on SCC2 Emergency Stop logic,
  EKF-based RoadRadius fusion, FOC brake-distribution logic, and target object selection robustness for heavy-duty commercial-vehicle ADAS.

