toolchain_context:
  title: "Public-Safe Toolchain Connection"
  body: >
    Separate portfolio toolchain pages show public-safe versions of engineering tools built to reduce validation bottlenecks and prepare for AI-based ADAS validation.
    The first two toolchains are proactive AI-transition platforms built under commercial-vehicle resource constraints; they are not presented as already deployed team-wide production tools.
    The BEV target-selection validation studio reflects a workflow that was actively used during commercial-vehicle production development to investigate real-log false-detection behavior.
  bullets:
    - "Legacy Calibration Setup to ADAS AI Validation Loop: resource-constrained prototype using CANape/VN1640/laptop field workflow to help module owners experiment with learned models on real vehicle signals."
    - "ADAS Log-to-AI Workbench: MF4-to-AI transition workflow for converting familiar measurement logs into reusable datasets, model training runs, and exportable artifacts."
    - "BEV Target Selection Validation Studio: production-development replay workflow using real logs and TOS/ODP logic to reduce repeated road-test loops for false target-selection analysis."

