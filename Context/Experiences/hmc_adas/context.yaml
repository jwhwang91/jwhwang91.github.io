id: "hmc-adas"
title: "Commercial-Vehicle ADAS Controls & Validation"
pill: "Public-Safe Production ADAS Case Study"
summary: >
  This page summarizes my public-safe experience in production commercial-vehicle ADAS controls and validation at Hyundai Motor Company.
  The work involved selected SCC/L2 ADAS behavior logic, calibration and validation workflows, production issue response, vehicle-level debugging,
  and practical toolchains across heavy-duty truck, tractor, bus, ICE, and FCEV platforms.
  Proprietary source code, signal names, calibration metadata, CAN database content, calibration values, thresholds, vehicle logs, and internal implementation details are intentionally omitted.

