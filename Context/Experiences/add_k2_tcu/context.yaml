id: "add-k2-tcu"
title: "ADD K2 TCU Software Development - Perfect V-Cycle"
pill: "Transmission Control / Heavy Vehicle Productization"
summary: >
  TCU application software development for the K2 55-ton tracked vehicle,
  covering control algorithms, hydraulic/mechanical plant modeling, HILS,
  dynamometer validation, vehicle field testing, calibration, and reliability support.

sections:
  - title: "Project Scope"
    body: >
      Developed and validated TCU application software for tracked-vehicle transmission control.
      The work connected model-based development, software verification, powerpack testing,
      and real vehicle field validation.
  - title: "My Role"
    bullets:
      - "Developed core TCU control algorithms."
      - "Built MILS/HILS transmission plant models for hydraulic and mechanical behavior."
      - "Verified TCU software using RCP/MABx HILS environment."
      - "Supported dynamometer and actual vehicle tests using development TCU hardware."
      - "Performed software verification, correction, parameter calibration, and reliability-test support."
  - title: "V-Cycle Evidence"
    bullets:
      - "MILS: algorithm and plant-model validation before hardware testing."
      - "HILS: C code mounted to RCP/development TCU and tested with dSPACE tools."
      - "Dynamometer: powerpack validation using engine/transmission test environment."
      - "Vehicle: field validation with K2 vehicle installation and multiple driving routes."
  - title: "Control Logic Highlights"
    bullets:
      - "Shift-state and driver-intent decision logic."
      - "Shift-map selection, gear/clutch combination decision, and clutch pressure logic."
      - "Clutch adaptation, EOL gap learning, and kiss-point pressure learning."
      - "CAN communication, Vector CANape calibration, vFlash, UDS, and J1939-related workflows."

